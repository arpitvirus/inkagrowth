{% load static %}
<style>
    .navbar {
        position: sticky;
        top: 0;
        background-color: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        z-index: 1000;
        border-bottom: 1px solid var(--gray-border);
        padding: 18px 0;
    }

    .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
    }

    .site-logo {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        line-height: 0;
    }

    .site-logo img {
        width: 120px;
        height: 50px;
        object-fit: contain;
    }

    .nav-links {
        display: flex;
        gap: 32px;
        align-items: center;
        flex-wrap: wrap;
    }

    .nav-links a {
        text-decoration: none;
        color: var(--black, #111111);
        font-weight: 500;
        transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
        color: var(--red);
    }

    .header-cta {
        padding: 10px 24px;
        font-size: 0.9rem;
        white-space: nowrap;
    }

    .menu-toggle {
        display: none;
        background: none;
        border: none;
        font-size: 1.8rem;
        cursor: pointer;
        color: var(--black, #111111);
        transition: color 0.2s;
    }

    .menu-toggle:hover,
    .menu-toggle:focus-visible {
        color: var(--red);
    }

    @media (max-width: 768px) {
        .menu-toggle {
            display: block;
        }

        .nav-links {
            display: none;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
            gap: 18px;
            padding: 20px 0 10px;
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            margin-top: 10px;
        }

        .nav-links.active {
            display: flex;
        }

        .nav-container {
            flex-direction: row;
            flex-wrap: wrap;
        }
    }
</style>

<nav class="navbar" aria-label="Primary navigation">
    <div class="container nav-container">
        <a href="/" class="site-logo" aria-label="INKAGROWTH homepage">
            <img src="{% static 'img/inka_logo_transparent.png' %}" alt="INKAGROWTH Digital Marketing Agency Logo" width="120" height="50">
        </a>
        <button class="menu-toggle" id="mobileMenuToggle" type="button" aria-label="Open navigation menu" aria-controls="navLinks" aria-expanded="false">
            <i class="fas fa-bars" aria-hidden="true"></i>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/#services">Services</a>
            <a href="/#about">About</a>
            <a href="/#stats">Results</a>
            <a href="/#testimonials">Clients</a>
            <a href="https://blog.inkagrowth.com" target="_blank" rel="noopener noreferrer">Blog</a>
            <a href="/contact/">Contact</a>
            <a href="tel:+919389826074" class="btn-primary header-cta" aria-label="Call INKAGROWTH for a free quote">Get Free Quote</a>
        </div>
    </div>
</nav>

<script>
    (() => {
        const menuToggle = document.getElementById('mobileMenuToggle');
        const navLinks = document.getElementById('navLinks');
        if (!menuToggle || !navLinks) return;

        const icon = menuToggle.querySelector('i');
        const closeMenu = () => {
            navLinks.classList.remove('active');
            menuToggle.setAttribute('aria-expanded', 'false');
            menuToggle.setAttribute('aria-label', 'Open navigation menu');
            if (icon) {
                icon.classList.remove('fa-times');
                icon.classList.add('fa-bars');
            }
        };

        menuToggle.addEventListener('click', () => {
            const isOpen = navLinks.classList.toggle('active');
            menuToggle.setAttribute('aria-expanded', String(isOpen));
            menuToggle.setAttribute('aria-label', isOpen ? 'Close navigation menu' : 'Open navigation menu');
            if (icon) {
                icon.classList.toggle('fa-bars', !isOpen);
                icon.classList.toggle('fa-times', isOpen);
            }
        });

        navLinks.querySelectorAll('a').forEach((link) => {
            link.addEventListener('click', closeMenu);
        });
    })();
</script>
