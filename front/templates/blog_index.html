{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <meta name="robots" content="index, follow">
    <meta name="author" content="INKAGROWTH">
    <link rel="canonical" href="{{ canonical }}">
    <link rel="icon" href="{% static 'img/logo.png' %}" sizes="48x48" type="image/png">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:url" content="{{ canonical }}">
    <meta property="og:image" content="https://www.inkagrowth.com/static/img/logo.png">
    <script type="application/ld+json">{{ schema_json|safe }}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: #111111; background: #ffffff; line-height: 1.65; }
        :root { --red:#d43c32; --gray-border:#e9e9ef; --gray-light:#f7f7f9; }
        .container { max-width: 1120px; margin: 0 auto; padding: 0 32px; }
        .navbar { position: sticky; top: 0; background: rgba(255,255,255,.94); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 1px solid var(--gray-border); padding: 18px 0; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
        .nav-links { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
        .nav-links a, .post-card a { text-decoration: none; color: #111111; font-weight: 600; }
        .nav-links a:hover, .post-card a:hover { color: var(--red); }
        .hero { padding: 78px 0 44px; border-bottom: 1px solid var(--gray-border); }
        h1 { font-size: 3rem; line-height: 1.12; letter-spacing: 0; margin-bottom: 16px; }
        p { color: #444; }
        .posts { padding: 56px 0 82px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
        .post-card { border: 1px solid var(--gray-border); border-radius: 8px; padding: 24px; background: #ffffff; }
        .post-card p { margin-top: 10px; }
        @media(max-width: 760px) { h1 { font-size: 2.2rem; } .posts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/"><img src="{% static 'img/inka_logo_transparent.png' %}" alt="INKAGROWTH Digital Marketing Agency Logo" width="120" height="50"></a>
            <div class="nav-links">
                <a href="/">INKAGROWTH Home</a>
                <a href="/about-inkagrowth/">About</a>
                <a href="/team/">Team</a>
                <a href="/contact/">Contact</a>
            </div>
        </div>
    </nav>
    <main>
        <section class="hero">
            <div class="container">
                <h1>{{ page.heading }}</h1>
                <p>{{ page.intro }}</p>
            </div>
        </section>
        <section class="container posts">
            {% for slug, post in posts.items %}
                <article class="post-card">
                    <h2><a href="/blog/{{ slug }}/">{{ post.heading }}</a></h2>
                    <p>{{ post.summary }}</p>
                    <p><a href="/blog/{{ slug }}/">Read the official INKAGROWTH article</a></p>
                </article>
            {% endfor %}
        </section>
    </main>
    {% include 'partials/footer.html' %}
</body>
</html>
