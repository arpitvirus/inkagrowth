{% extends 'crm/base/base.html' %}

{% block title %}Add Service | InkaGROWTH CRM{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="page-kicker">Catalog</p>
        <h2>Add service</h2>
        <p>Create a reusable service option for leads and clients.</p>
    </div>
    <div class="page-actions">
        <a class="btn btn-secondary" href="{% url 'service_list' %}">
            <i data-lucide="arrow-left"></i>
            <span>Back</span>
        </a>
    </div>
</section>

<form class="form-card" method="post">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-field">
            <label for="name">Service name</label>
            <input id="name" name="name" type="text" placeholder="Example: Local SEO Management" required>
        </div>

        <div class="form-field">
            <label for="price">Price</label>
            <input id="price" name="price" type="number" min="0" step="0.01" placeholder="Monthly or package price" required>
        </div>

        <div class="form-field full">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Briefly describe scope, deliverables, or billing notes"></textarea>
        </div>
    </div>

    <div class="form-actions">
        <a class="btn btn-secondary" href="{% url 'service_list' %}">Cancel</a>
        <button class="btn btn-primary" type="submit">
            <i data-lucide="save"></i>
            <span>Save Service</span>
        </button>
    </div>
</form>
{% endblock %}
