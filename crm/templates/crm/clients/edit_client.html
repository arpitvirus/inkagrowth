{% extends 'crm/base/base.html' %}

{% block title %}Edit Client | InkaGROWTH CRM{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="page-kicker">Accounts</p>
        <h2>Edit client</h2>
        <p>Keep account details, billing, service, and renewal information current.</p>
    </div>
    <div class="page-actions">
        <a class="btn btn-secondary" href="{% url 'client_detail' client.pk %}">
            <i data-lucide="arrow-left"></i>
            <span>Back</span>
        </a>
    </div>
</section>

<form class="form-card" method="post">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-field">
            <label for="name">Client name</label>
            <input id="name" name="name" type="text" value="{{ client.name }}" required>
        </div>

        <div class="form-field">
            <label for="company_name">Company</label>
            <input id="company_name" name="company_name" type="text" value="{{ client.company_name|default:'' }}">
        </div>

        <div class="form-field">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" value="{{ client.phone }}" required>
        </div>

        <div class="form-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" value="{{ client.email|default:'' }}">
        </div>

        <div class="form-field">
            <label for="website">Website</label>
            <input id="website" name="website" type="url" value="{{ client.website|default:'' }}">
        </div>

        <div class="form-field">
            <label for="service">Service</label>
            <select id="service" name="service">
                <option value="">Select a service</option>
                {% for service in services %}
                <option value="{{ service.id }}" {% if service.id == client.service_id %}selected{% endif %}>{{ service.name }} - Rs. {{ service.price|floatformat:2 }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field">
            <label for="monthly_charges">Monthly charges</label>
            <input id="monthly_charges" name="monthly_charges" type="number" min="0" step="0.01" value="{{ client.monthly_charges|default_if_none:'' }}">
        </div>

        <div class="form-field">
            <label for="renewal_date">Renewal date</label>
            <input id="renewal_date" name="renewal_date" type="date" value="{{ client.renewal_date|date:'Y-m-d' }}">
        </div>

        <div class="form-field full">
            <label for="status">Status</label>
            <select id="status" name="status">
                {% for value, label in status_choices %}
                <option value="{{ value }}" {% if client.status == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field full">
            <label for="address">Address</label>
            <textarea id="address" name="address">{{ client.address|default:'' }}</textarea>
        </div>

        <div class="form-field full">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes">{{ client.notes|default:'' }}</textarea>
        </div>
    </div>

    <div class="form-actions">
        <a class="btn btn-secondary" href="{% url 'client_detail' client.pk %}">Cancel</a>
        <button class="btn btn-primary" type="submit">
            <i data-lucide="save"></i>
            <span>Update Client</span>
        </button>
    </div>
</form>
{% endblock %}
