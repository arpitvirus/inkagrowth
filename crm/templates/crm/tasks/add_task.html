{% extends 'crm/base/base.html' %}

{% block title %}Add Task | InkaGROWTH CRM{% endblock %}

{% block content %}
<section class="page-header">
    <div>
        <p class="page-kicker">Execution</p>
        <h2>Add task</h2>
        <p>Create a clear work item with owner, priority, client relation, and due date.</p>
    </div>
    <div class="page-actions">
        <a class="btn btn-secondary" href="{% url 'task_list' %}">
            <i data-lucide="arrow-left"></i>
            <span>Back</span>
        </a>
    </div>
</section>

<form class="form-card" method="post">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-field full">
            <label for="title">Task title</label>
            <input id="title" name="title" type="text" placeholder="Example: Send monthly SEO report" required>
        </div>

        <div class="form-field">
            <label for="assigned_to">Assigned to</label>
            <select id="assigned_to" name="assigned_to">
                <option value="">Unassigned</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field">
            <label for="related_client">Related client</label>
            <select id="related_client" name="related_client">
                <option value="">No client</option>
                {% for client in clients %}
                <option value="{{ client.id }}">{{ client.name }}{% if client.company_name %} - {{ client.company_name }}{% endif %}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field">
            <label for="due_date">Due date</label>
            <input id="due_date" name="due_date" type="date">
        </div>

        <div class="form-field">
            <label for="priority">Priority</label>
            <select id="priority" name="priority">
                {% for value, label in priority_choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field">
            <label for="status">Status</label>
            <select id="status" name="status">
                {% for value, label in status_choices %}
                <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field full">
            <label for="description">Description</label>
            <textarea id="description" name="description" placeholder="Add scope, links, acceptance notes, or handoff details"></textarea>
        </div>
    </div>

    <div class="form-actions">
        <a class="btn btn-secondary" href="{% url 'task_list' %}">Cancel</a>
        <button class="btn btn-primary" type="submit">
            <i data-lucide="save"></i>
            <span>Save Task</span>
        </button>
    </div>
</form>
{% endblock %}
